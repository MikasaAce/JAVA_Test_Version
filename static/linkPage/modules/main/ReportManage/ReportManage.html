<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <!--<link rel="stylesheet" href="../../../js/element/index.css">-->
    <link rel="stylesheet" href="../../../../assets/libs/element/index.css">
    <link rel="stylesheet" href="ReportManage.css">

    <title>导出报告管理</title>
    <style>

    </style>
</head>
<!--{% raw %}-->
<body>

<div id="app">
    <el-row :gutter="20" style="margin: 20px">
        <div class="slecet" style="margin-right:20px;margin-bottom: 15px; ">
            <el-form :inline="true" :model="query" class="demo-form-inline" method="post" >
                <el-row :gutter="20" >
                    <el-col :span="1" v-if="isback"><el-button  @click="goback()">返回</el-button></el-col>
                    <el-col :span="23">
<!--                        <el-form-item label="报告类型:">-->
<!--                            <el-select v-model="query.type" placeholder="请选择扫描类型">-->
<!--                                <el-option label="所有类型" value=""></el-option>-->
<!--                                <el-option label="EXCEL" value="excel"></el-option>-->
<!--                                <el-option label="PDF" value="pdf"></el-option>-->
<!--                            </el-select>-->
<!--                        </el-form-item>-->

                        <el-form-item label="项目名称：">
                            <el-input v-model="query.name" placeholder="请输入关键字"></el-input>
                        </el-form-item>
                        <el-form-item label="漏洞扫描时间：">
                            <el-date-picker
                                    v-model="query.fileDate"
                                    type="datetimerange"
                                    value-format="yyyy-MM-dd HH:mm:ss"
                                    range-separator="至"
                                    start-placeholder="开始日期"
                                    end-placeholder="结束日期">
                            </el-date-picker>
                        </el-form-item>

                        <el-form-item>
                            <el-button type="primary" @click="getAllList()">查询</el-button>
                        </el-form-item>
                    </el-col>
                </el-row>
            </el-form>
        </div>
    </el-row>

    <el-card class="box-card" style="margin: 20px">
        <div class="head">
            报告列表
        </div>
        <template>
            <el-table v-loading="loading" :data="tableData" class="table" :header-cell-style="{textAlign:'center'}" :cell-style="{textAlign:'center'}" tooltip-effect="dark" style="width: 100%" >
                <el-table-column prop="itemname" label="项目名称" width="200"></el-table-column>
                <el-table-column prop="taskname" label="任务名称" width="200"></el-table-column>
<!--                <el-table-column prop="dataSetName" label="文件名称" width="200"></el-table-column>-->
<!--                <el-table-column prop="data1" label="扫描类型" width="150"></el-table-column>-->
                <el-table-column prop="fileType" label="报告类型" width="150"></el-table-column>
                <el-table-column prop="export_name" label="导出文件" width="300"></el-table-column>
                <el-table-column prop="startTime" label="漏洞扫描时间" show-overflow-tooltip></el-table-column>
                <el-table-column prop="createTime" label="文件导出时间" show-overflow-tooltip></el-table-column>
                </el-table-column>
                <el-table-column  fixed='right' label="操作" width="200px">
                    <template v-slot="scope">
                        <el-row style="text-align: center">
                            <el-col :span="12">
                                <el-button size="mini" type="primary" @click="downLoad(scope.row)">下载</el-button>
                            </el-col>
                            <el-col :span="12">
                                <el-button size="mini" type="danger" @click="delopen(scope.row)">删除</el-button>
                            </el-col>
                        </el-row>
                    </template>
                </el-table-column>
            </el-table>
            <el-pagination
                    background
                    layout="total, sizes, prev, pager, next, jumper"
                    :total="count"
                    @current-change="handleCurrentChange"
                    @size-change="handleSizeChange"
                    :page-sizes="[5,10,20]"
                    :current-page="currentPage"
                    :page-size="pageSize"
                    style="text-align: center">
            </el-pagination>
        </template>

    </el-card>


</div>

<script src="../../../../assets/libs/vue/vue.js"></script>
<script src="../../../../assets/libs/element/index.js"></script>
<script src="../../../../assets/libs/jquery-1.11.3.min.js"></script>
<script src="../../../../assets/js/mainData.js"></script>
<script src="ReportManage.js" ></script>


</body>
<!--{% endraw %}-->
</html>
