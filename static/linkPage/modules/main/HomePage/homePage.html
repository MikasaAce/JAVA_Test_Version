<!DOCTYPE html>

    <link rel="stylesheet" href="../../../../assets/libs/element/index.css">
    <title>首页统计</title>
    <style>
        .clearfix:before,
        .clearfix:after {
            display: table;
            content: "";
        }
        .clearfix:after {
            clear: both
        }

        .box-card1 {
            /*width: 300px;*/
            margin: 10px;
            height: 100%;
        }
        .box-card2 {
            /*width: 160px;*/
            margin: 10px;
        }
        .box-card3 {
            /*width: 600px;*/
            margin: 10px;
            height: 100%;
        }
        .card_Header {
            font-size: 20px;font-weight: bolder;
        }
        .topData{
            width: 100%;
            height: 90px;
            /*border: red solid 1px;*/
            padding: 5px;
        }
        .top_title{
            width: 100%;
            height: 30px;
            line-height: 30px;
            font-size: 16px;
            color: #7f7f7f;
            margin-left: 8px;
        }
        .top_data{
            width: 100%;
            height: 50px;
            line-height: 50px;
            font-size: 25px;
            margin-left: 8px;
            /*text-align: center;*/
        }
        .el-card__body {
            height: calc(100% - 60px); /* 根据 header 高度调整 */
            padding:10px;
            position: relative; /* 关键定位 */
        }
        #echarts1, #echarts2, #echarts3,
        #echarts4, #echarts5, #echarts6 {
            width: 100%;
            height: 100% !important; /* 强制继承容器高度 */
            /*min-height: 180px; !* 防止内容塌陷 *!*/
        }
        /*前三名的序号*/
        .rank_position1 {
            font-size: 1rem;
            font-weight: bold;
            margin-right: 20px;
            color: #FF6701;
        }
        /*其他序号*/
        .rank_position {
            font-size: 1rem;
            font-weight: bold;
            margin-right: 20px;
            color: #666666;
        }
        .rank_name {
            font-size: 1rem;
            /*font-weight: bold;*/
        }
        .rank_num {
            font-size: 1rem;
            color: #7a7a7a;
            font-style: italic; /* 设置为斜体 */

        }

            </el-card></el-col>

                <el-container style="height: 100%;">

                </el-container>
            </el-card></el-col>
        </el-row>


        <el-row :gutter="20" style="margin: 30px 0 20px 0" style="height: 100px">
            <el-col :span="5">
                <div class="topData">
                    <div class="top_title">项目总数:</div>
                    <div class="top_data">{{count.item_count}}个</div>
                </div>
            </el-col>
            <el-col :span="5">
                <div class="topData">

            </el-col>
            <el-col :span="5">
                <div class="topData">
                    <div class="top_title">已完成检测:</div>

                </div>
            </el-col>
            <el-col :span="5">
                <div class="topData">
                    <div class="top_title">正在检测:</div>
                    <div class="top_data">{{count.testing_count}}个</div>
                </div>
            </el-col>
            <el-col :span="4">
                <div class="topData">
                    <div class="top_title">检测失败任务数:</div>
                    <div class="top_data">{{count.fail_count}}个</div>
                </div>
            </el-col>

        </el-row>
