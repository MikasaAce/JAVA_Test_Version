<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport"
        content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <!--<link rel="stylesheet" href="../../../js/element/index.css">-->
  <link rel="stylesheet" href="../../../../assets/libs/element/index.css">
<!--  <link rel="stylesheet" href="ReportManage.css">-->

  <title>团队数据汇总</title>
  <style>

  </style>
</head>
<!--{% raw %}-->
<body>

<div id="app">
  <el-row :gutter="20" style="margin: 20px">
    <div class="slecet" style="margin-right:20px;margin-bottom: 15px; ">
      <el-form :inline="true" :model="query" class="demo-form-inline" method="post" >
        <el-form-item label="用户名：">
          <el-input v-model="query.name" placeholder="请输入关键字"></el-input>
        </el-form-item>

        <el-form-item>
          <el-button type="primary" @click="checkFormData()">查询</el-button>
        </el-form-item>
      </el-form>
    </div>
  </el-row>

  <el-card class="box-card" style="margin: 20px">
    <div class="head">
      团队数据汇总
    </div>
    <template>
      <el-table v-loading="loading" :data="tableData" class="table" :header-cell-style="{textAlign:'center'}" :cell-style="{textAlign:'center'}" tooltip-effect="dark" style="width: 100%" >
        <el-table-column prop="username" label="用户名" width=""></el-table-column>
        <el-table-column prop="teamName" label="团队名" width=""></el-table-column>
        <el-table-column prop="itemNum" label="项目数" width=""></el-table-column>
        <el-table-column prop="vulNum" label="漏洞总数" width=""></el-table-column>
        <el-table-column prop="highNumber" label="高危" show-overflow-tooltip></el-table-column>
        <el-table-column prop="mediumNumber" label="中危" show-overflow-tooltip></el-table-column>
        <el-table-column prop="lowNumber" label="低危" show-overflow-tooltip></el-table-column>
        <el-table-column prop="vulType" label="检出漏洞类型（TOP5）" width="500"></el-table-column>
      </el-table>
      <el-pagination
              background
              layout="total, sizes, prev, pager, next, jumper"
              :total="count"
              @current-change="handleCurrentChange"
              @size-change="handleSizeChange"
              :page-sizes="[5,10,20]"
              :current-page="currentPage"
              :page-size="pageSize"
              style="text-align: center">
      </el-pagination>
    </template>

  </el-card>


</div>

<script src="../../../../assets/libs/vue/vue.js"></script>
<script src="../../../../assets/libs/element/index.js"></script>
<script src="../../../../assets/libs/jquery-1.11.3.min.js"></script>
<script src="../../../../assets/js/mainData.js"></script>
<script src="DataSummary.js" ></script>


</body>
<!--{% endraw %}-->
</html>
