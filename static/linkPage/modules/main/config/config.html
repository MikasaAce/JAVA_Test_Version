<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport"

  <link rel="stylesheet" href="../../../../assets/libs/element/index.css">
  <title>配置策略</title>
  <style>
    .clearfix:before,
    .clearfix:after {
      display: table;
      content: "";
    }
    .clearfix:after {
      clear: both
    }
    .box-card {
      width: 80%;
    }
    html,body,div{
      margin: 0;
      padding: 0;
    }
    html,body{
      height: 100%;
    }

    .box {
      width: 50%;
      height: 50%;
      background: #ffffff;
      border: 1px solid #EBEEF5 ;
      border-radius: 5px;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%); /*向左向上分别平移自身的一半*/
      /*-webkit-transform: translate(-50%, -50%);*/
      /*-moz-transform: translate(-50%, -50%);*/
      /*transition: 1s*/
    }
    .title {
      width: 100%;
      float: left;
      font-size: 18px;
      padding: 18px 20px;
      border-bottom: 1px solid #EBEEF5;
      box-sizing: border-box;
    }
    .el-radio-group {
      margin: 20px;
    }
    .el-avatar, .el-cascader-panel, .el-radio, .el-radio--medium.is-bordered .el-radio__label, .el-radio__label {
      font-size: 18px;
    }
    .buttonSave{
      text-align: center;
      position: absolute;
      bottom: 18%;
      left: 45%;
    }

    .el-input__inner{
      width: 100%;
    }
    .el-cascader, .el-tag {
      display: flex;
    }
    .el-radio {
      margin: 30px 150px 30px 0;

    }
  </style>
</head>

<body>
<div id="app">

  <template>

        <div><el-radio label="rule6">降误报模型（中速模式：以降低一部分速度的前提下，提升大模型扫描的精度降低误报率）</el-radio></div>  <!--自定义规则单独扫描+S降误报-->
