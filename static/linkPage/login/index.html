    <style>
        .layui-footer {
            display: flex;
            flex-flow: row nowrap;
        }

        .tag>a {
            padding: 0 20px;
            color: rgb(228, 2, 18) !important;
        }

        .layui-layer.layui-layer-adminRight {
            top: 90px !important;
            width: 448px !important;
        }

        .layui-layer.layui-layer-adminRight>.layui-layer-content {
            width: 448px !important;
        }

        .centerTitleDiv {
            line-height: 90px;
            color: white;
            font-size: 24px;
            font-weight: bold;
            display: inline-block;
            margin-left: 20px;
        }

        /* 消息图标样式 */
        .message-icon {
            position: relative;
            margin-right: 10px;
            cursor: pointer;
        }

        .message-icon .layui-icon {
            font-size: 50px;
            color: #fff;
        }

        .message-badge {
            position: absolute;
            top: 52px;
            right: -8px;
            font-size: 10px;
            padding: 2px 2px;
            border-radius: 50%;
            min-width: 8px;
            text-align: center;
            line-height: 1;
        }

        .message-badge.unread {
            background-color: #ff4d4f; /* 红色背景 */
            color: #fff; /* 白色文字 */
        }

        .message-badge.read {
            background-color: #fff; /* 白色背景 */
            color: #999; /* 灰色文字 */
            border: 1px solid #ddd; /* 边框 */
        }

        .message-popup-content {
            padding: 20px;
            font-size: 15px;
            line-height: 1.6;
            max-height: 550px;
            overflow-y: auto;
            background-color: #f3f3f3;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .message-item {
            padding: 20px;
            border-bottom: 1px solid #eee;
            color: #333;
            background-color: #fff;
            margin-bottom: 10px;
            border-radius: 6px;
            transition: background-color 0.3s ease;
        }

        .message-item:hover {
            background-color: #f9f9f9;
        }

        .message-text {
            white-space: normal;
            word-break: break-word;
            font-size: 14px;
            color: #333;
            margin-bottom: 5px;
        }

        .message-time {
            color: #999;
            font-size: 13px;
            text-align: right;
        }

        .no-message {
            color: #999;
            text-align: center;
            cursor: default;
        }

        .message-item.unread-item {
            position: relative;
        }

        .message-item.unread-item::after {
            content: '';
            position: absolute;
            top: 0px;
            right: -5px;
            width: 0;
            height: 0;
            border-left: 8px solid transparent;
            border-right: 8px solid transparent;
            border-bottom: 8px solid #ff4d4f;
            transform: rotate(45deg);
        }
    </style>
</head>

    <script id="sideNav" type="text/html">
    {{#  layui.each(d, function(index, item){ }}
    <li class="layui-nav-item">
        <a href="{{item.url}}" target="{{item.target}}">
            <i class="layui-icon {{item.icon}}"></i>&emsp;<cite>{{ item.name }}</cite>
        </a>
        {{# if(item.subMenus&&item.subMenus.length>0){ getSubMenus(item.subMenus); } }}
    </li>
    {{#  }); }}
    {{# function getSubMenus(subMenus){ }}
    <dl class="layui-nav-child">
        {{# layui.each(subMenus, function(index, subItem){ }}
        <dd>
            <a href="{{ subItem.url }}" target="{{subItem.target}}">
                {{# if(subItem.icon){ }}
                <i class="layui-icon {{subItem.icon}}"></i>&emsp;
                {{# } }}
                {{ subItem.name }}
            </a>
            {{# if(subItem.subMenus&&subItem.subMenus.length>0){ getSubMenus(subItem.subMenus); } }}
        </dd>
        {{# }); }}
    </dl>
    {{# } }}
</script>
