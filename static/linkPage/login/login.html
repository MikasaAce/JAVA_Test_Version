<!DOCTYPE html>
<html lang="en" style="height: 100%">
<head>
    <meta charset="UTF-8">
    <title>静态代码安全扫描系统</title>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <link rel="stylesheet" href="/static/assets/libs/element/index.css">
    <link rel="stylesheet" href="/static/linkPage/login/login.css">
    <style>
        .header {
            background-color: #18336e;
            color: #333;
            max-height: 80px;
            padding-left: 40px;
        }
        .footer {
            background-color: #18336e;
            color: #333;
            text-align: center;
            line-height: 100px;
            height: 100px;
        }
        .main {
            text-align: center;
            height: calc(100% - 80px);
            background-image: url(/static/assets/images/lexin_pic.jpg);
            background-size: cover;
            background-position: center;
        }
        .captcha-display {
            display: inline-block;
            margin-left: 10px;
            border: 1px solid #d1d1d1;
            cursor: pointer;
            user-select: none;
            background-color: #f4f4f4;
        }
         img {
            height: 50px;
            margin-top: 15px;
            margin-bottom: 15px;
        }
    </style>
</head>
<body style="height: 100%">
<div id="app" style="height: 100%">
    <template style="height: 100%">

        <div class="header">
          <img src="/static/assets/images/blingLOGO.png" alt="">
        </div>
        <el-row class="main">
            <div class="loginDiv">
                <div class="login-content">
                    <h1 class="login-title">静态代码安全扫描系统</h1>
                    <el-form :model="loginForm"  style="" ref="loginForm">
                        <el-form-item  prop="name">
                            <el-input style="width: 350px" type="text" v-model="loginForm.name" placeholder="请输入账号"
                                      autocomplete="off"  ><template slot="prepend">账号</template></el-input>
                        </el-form-item>
                        <el-form-item label="" prop="password">
                            <el-input style="width: 350px" type="password" v-model="loginForm.password" placeholder="请输入密码"
                                      show-password autocomplete="off" ><template slot="prepend">密码</template></el-input>
                        </el-form-item>
                        <el-form-item label="" prop="captcha">
                            <el-input style="width: 214px" type="text" v-model="loginForm.captcha" placeholder="请输入验证码"
                                      autocomplete="off"></el-input>
                            <!--                            <el-input> 是一个表单输入框，它的默认对齐方式是基于文本基线（baseline）的。-->
                            <!--                            <canvas> 是一个块级元素，它的默认对齐方式是基于底部（bottom）的。-->
                            <canvas ref="captchaCanvas"  class="captcha-display" @click="generateCaptcha" style="vertical-align: middle;"></canvas>
                        </el-form-item>
                        <el-form-item>
                            <el-button type="primary" @click="confirm" style="width: 170px;background-color:#18336e;border-color:#18336e">登 录</el-button>
                            <el-button type="info" @click="reset" style="width: 170px">重 置</el-button>
                        </el-form-item>
                    </el-form>
                    <a href="http://{{ shared_ip }}/static/plugin/IDEA插件.zip"  download="插件.zip"><h5>IDEA插件下载</h5></a>
                </div>
            </div>
        </el-row>
<!--        <el-row class="footer">-->
<!--            <el-col :span="24"> <div style="color: white">Copyright © 2024武汉市教云慧智信息技术有限公司</div></el-col>-->
<!--        </el-row>-->
    </template>
</div>


    <script src="/static/assets/libs/jquery-1.11.3.min.js"></script>
    <script src="/static/assets/libs/vue/vue.js"></script>
    <script src="/static/assets/libs/element/index.js"></script>
    <script src="/static/linkPage/login/login.js"></script>
    <script src="/static/assets/js/mainData.js"></script>
</body>

</html>
